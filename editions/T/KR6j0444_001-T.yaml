body:
  text: 西天譯經三藏朝散大夫試光祿卿明教大師臣法賢奉詔譯焰鬘得迦忿怒明王成就儀軌分第一爾時妙吉祥化身大明王名焰鬘得迦遍身熾盛光甚惡大怖畏令諸大明王驚怖器杖落天人阿修羅恐怖而合掌悉皆歸命禮稱讚俱胝數見斯大焰光熱惱心如火如是而白言唯願大明王止息大惡相光明大熾盛遍照於十方三界諸天人及彼修羅等驚怖歸三寶頂禮佛法僧即時大明王息惡化善相具足大威德妙吉祥化身天人修羅等俱白大明王云何行精進種種而承事恭敬供養等而得大歡喜方便為開演斷除我等疑爾時大忿怒焰鬘得迦王如是聞彼語告天修羅等汝各具威德歸依佛法僧三寶勝功德信順如來勅利益諸眾生我止大惡形化為妙善相已受三歸者當發菩提心我有根本教大明成就法七字十字等如是成法句一切諸天人及彼阿蘇囉汝等當受持所願皆成滿此焰鬘得迦忿怒根本教我親所說時大地皆震動江海悉沸騰一切諸天人夜叉囉叉娑及以必舍佐身心俱顫掉怖畏大明王各發恭敬心合掌俱作禮受持大忿怒焰鬘得迦王根本心大明為護世正法於彼三界中一切人天內作成就儀軌最勝最第一焰鬘得迦王親自而宣說一切諸天人信受俱歡喜天上及人間恭敬頭面禮百千菩薩眾依法自修習廣行慈悲行如是此大教妙吉祥根本清淨儀軌法成就第一分焰鬘得迦必隷覩得羯吒曼拏羅成就儀軌分第二復次最上曼拏羅儀軌能於三界作大怖畏能施所求一切滿願此名必隷覩得羯吒曼拏羅成就法持明行人先須揀擇所樂之地或大樹之下或尸陀林中或空舍內或四衢道路之傍或於山間或二塔中間或園林內或山頂上或河岸海岸或牛欄內或鬪戰之地或大自在天祠及諸寂靜之處隨自意樂當建曼拏羅復須依法潔淨於彼地內所有荊棘瓦石砂礫骨髮橛木等不潔之物悉皆除去然後以五藥淨水合瞿摩夷塗曼拏羅地時持明者經宿沐浴淨持齋戒志意專心誦此大明作自擁護復次以兜羅綿或麻合三股線絣四方曼拏羅先從東方起首四方四隅次第依法如是絣已用屍灰粉於曼拏羅四方四隅作於四門唯開南門餘三常閉曼拏羅中心粉一蓮花復於東北隅起首依法次第以屍灰畫諸賢聖及寶杖印於曼拏羅四門各畫一必隷多形中間蓮花上畫第五必隷多形以髑髏為裝嚴如是曼拏羅中一一依法悉令周足復次曼拏羅有其八種闊一肘曼拏羅為常供養儀闊二肘曼拏羅為消災增益儀闊三肘曼拏羅為發遣設咄嚕儀闊四肘曼拏羅為敬愛句召儀闊五肘曼拏羅為禳災除病儀闊六肘曼拏羅為除魔及宿曜儀闊七肘曼拏羅為句召諸天敬愛儀闊八肘曼拏羅為一切所求成就儀如是八肘已上作者非依儀軌必不成就持明者畫曼拏羅已以滿鉢盛香水滿鉢盛種種妙花及沈香旃檀香安息香酥燈油燈如是依法次第安置必得成就復次或作大惡曼拏羅法持明者用涅哩嚩娑為燈以酒肉魚及種種飲食當用出生即行人作禮諸佛發菩提心時持明者依法自畫曼拏羅內賢聖形像及標幟等如不能畫依法觀想曼拏羅蓮花之上有微妙字化成必隷多得羯吒復想曼拏羅四隅各一寶杖四門各一必隷多即誦必隷多大明如是誦已復想曼拏羅內八種標幟其名曰賀悉多波那尸囉娑建馱部惹羯嚕吒親那左哩摩捺囉設嚩摩攞如是想已誦此大明而作現前然後請召焰鬘得迦大忿怒明王入自心中身黑色大惡相具大威德遍身熾焰六面各有三目目作赤黃色頭髮及眉皆赤黃色六足足蹋必隷多十二臂右第一手作施願印第二手執鉤第三手執三叉第四手執劍第五手執寶杖第六手執鉞斧左第一手執髑髏第二手執旗第三手執都摩囕第四手執羂索第五手竪頭指第六手執寶杖用半乾半潤人頭為鬘飾虎皮為衣身大腹廣面作種種忿怒相惡色變動如海沸騰現相不定或作忿怒相或作善相或作大惡相或作怖畏相或開口出舌或露現牙齒如是依法粉畫觀想亦然如是想已以香水獻閼伽及紅色花於必隷多頂上復用赤檀香花及花鬘獻焰鬘得迦明王頂上即誦焰鬘得迦明王心大明持明者觀想此明王心大明入自心中誦頭大明想在頭上誦頂大明想在頂上誦甲冑大明想為甲冑如是觀想已復誦香大明即獻香然後於曼拏羅四方四隅各燃於燈供養即以種種飲食及上妙香花獻焰鬘得迦忿怒明王復以種種飲食出生獻必隷多及一切鬼神等復用滿鉢淨水滿鉢好香安置曼拏羅外然後依法令受法弟子沐浴潔淨已即誦忿怒明王大明加持一花令彼弟子以二手指執此一花而復用帛覆於頭面念三寶名時阿闍梨引弟子入曼拏羅內令發誓願即便拋花向曼拏羅中與去面帛認本尊阿闍梨與弟子說寶杖印及三寶祕密三昧印即以香花水灌弟子頂復以香花供養所有忿怒明王心大明授與弟子時弟子受大明已頭面作禮隨力布施供養阿闍梨弟子所願之事必得成就復用滿鉢香水安曼拏羅東邊獻明王閼伽水時阿闍梨即誦發送大明發送焰鬘得迦大忿怒明王歸於本位於曼拏羅獻閼伽水如是依法常作能得世間廣大無等之福忿怒明王必隷覩得羯吒曼拏羅大明成就儀軌分第三復說曼拏羅中第一必隷多大明曰唵引薩莫薩哩嚩二合怛他引誐帝引毘藥二合一必隷二合多目佉二佉引那迦娑嚩二合引賀引三復說曼拏羅東門必隷多大明曰唵引必隷二合引覩引攞迦二合引野一吽引發吒半音二復說曼拏羅南門必隷多大明曰唵引必隷二合引多鼻引鬘引怛迦一吽引發吒半音二復說曼拏羅西門必隷多大明曰阿引唵引必隷二合引多一入嚩二合攞二發吒半音三復說曼拏羅北門必隷多大明曰唵引乞叱二合鉢囉二合必隷二合引覩引一得羯二合吒二吽引發吒半音三復說曼拏羅四隅寶杖大明曰唵引曩莫沒馱達哩摩二合僧祇毘藥二合一薩哩嚩二合怛他引誐帝引毘藥二合二阿引骨嚕二合引馱尾惹野引三仡儞二合引入嚩二合哩多四𡁠賀嚩二合引五必隷二合引多始囉六吽引發吒半音七請召焰鬘得迦明王大明曰唵引曩謨引沒馱達哩摩二合僧祇引毘藥二合一骨嚕二合引達嚩囉尾引囉二合莎二三摩曳引曩三阿誐蹉四阿引誐蹉五唵引阿引吽引六壹難必隷二合引多娑喃七必隷二合引覩引得羯二合吒八𠸪乞叉二合𠸪乞叉二合娑嚩二合引賀引九必隷多鬘大明曰唵引曩莫薩哩嚩二合怛他引誐帝引毘藥二合一必隷二合引多摩引隸引二尾訖哩二合帝引三虞呬也二合閉引四尾迦引囉目契五薩哩嚩二合𠸪乞芻二合鉢祖仁祖切瑟胝二合引六吽引發吒半音七十七微妙字大明曰阿引一骨嚕二合引提引迦焰鬘引得迦二賀曩三摩他四畔惹五吽引發吒半音引六明王心大明曰唵引阿引一吽引二此明為擁護觀想明王頭大明曰唵引迦引攞吽發吒半音一觀想明王頂大明曰唵引野鬘得枳引羯尾引囉一吽引發吒半音觀想明王甲冑大明曰唵引入嚩二合引攞引一入嚩二合里多尾仡囉二合賀二吽引發吒半音三觀想明王器仗大明曰唵引吠引嚩莎旦引多迦一吽引發吒半音二如是焰鬘得迦明王大明於身五處觀想獻閼伽大明曰唵引伊迦尾引囉一野鬘引怛迦二尾娑囉三尾娑囉四娑嚩二合引賀引五獻塗香大明曰唵引囉訖多二合一唧底二輸尼多引哩捺囉三合三蘇巘馱四尾仡囉二合賀五娑嚩二合引賀引六獻花大明曰唵引禰摩也二合一薩囉二合仡摩二合引攞也二合引二馱引哩尼引娑嚩二合引賀引三獻香大明曰唵引唧底一度波二必哩二合夜引野娑嚩二合引賀引三獻燈大明曰唵引禰麼也二合一𡁠踰二合引底瑟摩二合帝娑嚩二合引賀引二一切飲食出生大明曰唵引薩哩嚩二合引彌試引阿嚩賀引哩尼引二娑嚩二合引賀引三獻一切飲食及出生大明曰唵引禰摩焰二合引曩部引𡁠儞引一賀囉賀囉二訥凌二合引訥凌二合引三訥凌二合引朅娑嚩二合引賀引四必隷覩得羯吒曼拏羅中獻食及出生大明曰唵引窟窟儞一必隷二合引覩引得羯二合吒二必哩二合多摩引隷引三攞里儞四窟朗二合引窟朗二合引窟朗二合引窟朗二合引五必勵二合引六必勵二合引底始吠引七訥凌二合引訥凌二合引訥凌二合引八窟窟儞九仡哩二合恨拏二合十末凌娑嚩二合引賀引十一忿怒明王必隷覩得羯吒寶杖印曼拏羅祕密供養儀軌分第四復次妙吉祥化身焰鬘得迦明王大無畏身有無量光明依三寶儀法以手結印右手安前而現三昧拇指常密餘指緊作拳此是寶杖印時持明人用心大明或別明與此印同用不得違越此寶杖大明曰曩謨引沒馱達哩摩二合僧祇引毘藥二合一阿引二薩哩嚩二合怛他引誐多三骨嚕二合引達尾惹野四阿仡儞二合入嚩二合里多𡁠賀嚩二合五必隷多始囉六吽引發吒半音七此寶杖明并印亦名忿怒明王心明能作清淨能化器仗能調伏諸魔復說必隷覩得羯吒曼拏羅內寶杖印儀時持明者依法用屍灰於寶杖尖上畫一必隷多頭只得在曼拏羅內畫外不得畫兼持明人求成就者若求此杖一切所須無不成就復說彼寶杖印成就法如前必隷覩得羯吒曼拏羅作四方四隅及於中間九處各安寶杖印如是句召供養與此明王大明同用而為最上大明曰唵引唵引曩謨引沒馱達哩摩二合僧祇引毘藥二合阿引阿引二薩哩嚩二合怛他引誐多三骨嚕二合引馱尾惹野引仡儞二合四入嚩二合里多𡁠賀嚩二合必隷二合引多始囉吽引吽引發吒半音五此寶杖印大明於一切成就法中最上最勝能作廣大成就復說供養觀想法想畫一蓮花花作八葉為四方四隅從東方起首依法次第於四方四隅及花中間各安微妙字復作結界想吽字在寶杖必隷多頭上想唵字而作現前想唵曩莫字為供養阿上聲字為焰鬘得迦明王最勝三昧大明曰唵引曩謨引沒馱達哩摩二合僧祇毘藥二合一薩哩嚩二合沒馱引毘二僧窣覩二合多三先誦此明為歸命三寶然後用一切寶杖各各本明及本三昧而作忿怒顧視於剎那間一切所求皆悉成就此是如來所化復次依法各誦本大明已誦阿上聲字作最勝焰鬘得迦明王顧視為本三昧後誦吽字所有息災增益敬愛句召調伏發遣等一切成就若持明人作息災法先用唵字及本大明後誦別大明此是如來三昧能息一切災難若先誦大明後誦吽字及焰鬘得迦大明此是如來相能作最上事若敬愛法依大明本法後誦莎賀字能令諸天敬愛行人欲求大富當誦如來部大明如是常作必得大富若作增益法亦誦本大明後誦吽字速得增益若殺設覩嚕先誦吽字後誦發吒字即能殺彼若欲發遣先誦吽字後誦本大明及發吒字作祕密供養而能發遣如是前曼拏羅四方四隅及中間九處所有寶杖雖以香花供養飲食出生若不持誦大明終不得成如是增益敬愛息災調伏殺冤等法彼持明者了知祕密印法及曼拏羅等儀軌周足不在擇日擇時占觀星曜亦不假志持齋戒沐浴清淨等自然成就滿一切願若持明者發菩提心以香花果子飲食等隨力供養焰鬘得迦明王誦彼心大明滿六箇月隨意所求皆得成就忿怒明王必隷多曩毘寶杖印曼拏羅祕密供養儀軌分第五復次持明者於夜分往尸陀林中以屍灰畫四方曼拏羅作四門上用綵帛為仰塵懸拂鏡花鬘復於八方安八髑髏燃燈八盞中畫半屍屍上畫寶杖印別畫一必隷多此名必隷多曩毘曼拏羅能作一切成就時持明者依法出生供養即誦大明一洛叉令法精熟以髑髏滿盛輸尼帝獻寶杖印持明者用赤檀塗身潔淨已著赤色衣以大明甲冑為自擁護復用有辭辯勇猛精進者三人為同伴於黑月八日持明者止息諸根令心寂靜與前三人同入必隷多曩毘曼拏羅持明者安定而坐以手結印誦此大明或見種種魔境不得怯怖竟夜持誦必得成就降魔除冤最為第一乃至難成之法速得成就復次持明人持焰鬘得迦大明已即誦吽字及誦賀曩尾娑怖吒伴惹伴惹等大明時持明者作忿怒相立如舞勢經剎那間能令山嶽及州城樓閣等悉皆破壞復次持明者先誦吽字次誦捺囉尾娑怖吒伴惹伴惹等大明能破裂山河大地及開阿蘇囉宮門乃至一切所求皆得隨意復次先誦吽字次誦鉢左尾特鑁娑輸沙野等大明能枯涸流泉池沼乃至江河大海復次先持吽字次誦娑擔婆能禁伏一切魔事若誦兩遍能禁他軍全無動用如壁畫人若先誦吽字次誦訥凌能令設咄嚕惶亂或與前二句同用所作皆成若作忿怒相持誦能令他軍自亂馳散若先誦吽字次誦底瑟吒底瑟吒此明能禁伏囉惹若先誦吽次誦賀曩尾特鑁二合婆娑摩囉野發吒等能滅他軍若先誦吽字次誦朅朅佉呬佉呬等能令他軍速自作亂若先誦吽字次誦發吒吒訥凌二合訥凌二合酇酇訥凌二合訥凌二合如是此明能殺設咄嚕若先誦吽字次誦賀賀賀引賀引吠微多攞發吒若先誦吽字次誦賀賀賀引賀引等發吒此二種明能成就世間一切之事若先誦吽吽次誦訥凌二合訥凌二合酇酇訥哩發吒此明能一剎那間廣利世間如是明王所說儀軌印法修習精熟持誦之間護持一切菩薩三昧作一切事隨意成就復次持明者起首作成就法先誦一洛叉令法精熟即便作法若法未成用前如來三昧及句召大明後用頂禮大明及唵字已復唵字為第一阿引字為第二吽字為後句如是誦忿怒明王大明句已復誦吽字次誦唵字阿引字後誦吽字如是誦已復誦如來大明即密結印法誦大明一洛叉能作一切成就此是依法精熟儀則若不成就當復依前法作若不依法作持明者自得破壞此最勝焰鬘得迦明王法印所在之處彼持明者依法持誦能成就一切事乃至世間出世間能作成壞真實不虛於七由旬外能調伏魔冤及部多必隷多吠多拏等皆能破壞乃至句召諸天息災除患殺設咄嚕依此三昧心印儀軌具足明王歡喜以大威勢能令行人所作成就此是焰鬘得迦最上大無畏明王心印亦名寶杖印祕密法
